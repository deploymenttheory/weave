# Unattended macOS Tahoe Setup Assistant Configuration
# Use with: weave setup <vm> --unattended tahoe

# Seconds to wait after VM boots before starting automation.
# A fresh install's FIRST boot is slow (it finalises the install), so this is
# generous; the long first <wait> below also absorbs variable boot time.
boot_wait: 60

boot_commands:
  # The "Hello" greeting (cycling languages) requires a keypress to reach the
  # Language screen. On a fresh install the greeting can appear well after
  # boot_wait, so press space a few times over ~30s to dismiss it whenever it
  # shows; a stray space on the Language list is harmless (we filter by typing
  # "English" next).
  - "<delay 5>"
  - "<space>"
  - "<delay 10>"
  - "<space>"
  - "<delay 10>"
  - "<space>"

  # Language selection screen — wait generously for a slow first boot.
  - "<wait 'English', timeout=300>"
  - "<delay 1>"

  # Type "English" to filter the list, click on "English" to select it, then press Enter
  - "<type 'English'>"
  - "<delay 1>"
  - "<click 'English'>"
  - "<delay 1>"
  - "<enter>"
  - "<delay 2>"

  # Country/Region selection
  - "<wait 'Country or Region'>"
  - "<delay 1>"
  # Click in the center of the list area to give it focus before typing
  - "<click_at 960,900>"
  - "<delay 1>"
  # Type to filter the country list
  - "<type 'United States'>"
  - "<delay 1>"
  # Press Enter to select the filtered item in the list
  - "<enter>"
  - "<delay 1>"
  # Click Continue button to proceed
  - "<click 'Continue'>"
  - "<delay 2>"

  # Transfer Your Data to This Mac (Migration Assistant)
  - "<wait 'Transfer Your Data'>"
  - "<delay 30>" # wait for refresh
  # Use tab navigation to select "Set up as new" (4th option)
  - "<click 'Set up as new'>"
  - "<delay 2>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Written and Spoken Languages screen (appears AFTER "Set up as new")
  - "<wait 'Written and Spoken Languages'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Accessibility screen - skip it
  - "<wait 'Accessibility'>"
  - "<delay 1>"
  - "<click 'Not Now'>"
  - "<delay 2>"

  # Data & Privacy screen
  - "<wait 'Data & Privacy'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Create a Mac Account
  # Field order: Full Name -> Account Name (auto-filled) -> Password -> Verify Password -> Hint -> Checkbox -> Continue
  - "<wait 'Create a Mac Account'>"
  - "<delay 10>"
  - "<click 'Full Name'>"
  - "<delay 1>"
  # Type Full Name
  - "<type 'weave'>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  # Skip Account Name (auto-filled from Full Name)
  - "<tab>"
  - "<delay 1>"
  # Type Password
  - "<type 'weave'>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  # Type Verify Password
  - "<type 'weave'>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  # Skip Hint field
  - "<tab>"
  - "<delay 1>"
  # Untoggle "Allow computer account password to be reset with Apple Account" checkbox
  - "<space>"
  - "<delay 1>"
  # Click Continue button
  - "<click 'Continue'>"
  - "<delay 2>"

  # Sign In to Your Apple Account - skip it.
  # On macOS Tahoe 26.5 the skip option is "Sign In Later in Settings", hidden
  # behind the "Other Sign-In Options" disclosure (there is no "Set Up Later"
  # button). It then shows a "...skip signing in..." popup; click "Skip"
  # (exact-match avoids the adjacent "Don't Skip", which contains "skip").
  - "<wait 'Email or Phone Number'>"
  - "<delay 1>"
  - "<click 'Other Sign-In Options'>"
  - "<delay 2>"
  - "<click 'Sign In Later in Settings'>"
  - "<delay 1>"
  - "<click 'Skip'>"
  - "<delay 2>"

  # Age Range (new on Tahoe): choose Adult, then Continue.
  - "<wait 'Age Range'>"
  - "<delay 1>"
  - "<click 'Adult'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Terms and Conditions.
  # Exact-match clicking targets the "Agree" button (not "Disagree", which
  # contains "agree", nor "AGREE" in the licence body). macOS then shows a
  # confirmation popup ("...read and agree...") whose exact wording varies by
  # build, so rather than wait on its text we simply click "Agree" again after
  # a pause — the topmost exact "Agree" is the popup's button.
  - "<wait 'Terms and Conditions'>"
  - "<delay 2>"
  - "<click 'Agree'>"
  - "<delay 3>"
  - "<click 'Agree'>"
  - "<delay 2>"

  # Enable Location Services (skip it). Continue raises a "...don't want to use
  # Location Services?" popup; click "Don't Use" explicitly (exact-match) rather
  # than relying on the default button.
  - "<wait 'Enable Location Services'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 1>"
  - '<wait "Don''t Use">'
  - "<delay 1>"
  - '<click "Don''t Use">'
  - "<delay 2>"

  # Select Your Time Zone
  - "<wait 'Select Your Time Zone'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Analytics
  - "<wait 'Analytics'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Screen Time
  - "<wait 'Screen Time'>"
  - "<delay 1>"
  - "<click 'Set Up Later'>"
  - "<delay 2>"

  # Siri - skip entirely. Do NOT enable it, or it adds "Select a Siri Voice"
  # and "Improve Siri & Dictation" sub-screens. (Longer timeout: the previous
  # page can be slow.)
  - "<wait 'Siri', timeout=300>"
  - "<delay 2>"
  - "<click 'Set Up Later'>"
  - "<delay 2>"

  # FileVault - skip it. The screen title is "Your Mac is Ready for FileVault"
  # (matched by "FileVault"); "Not Now" raises a "...Not Be Securely
  # Encrypted..." popup confirmed with "Continue".
  - "<wait 'FileVault'>"
  - "<delay 1>"
  - "<click 'Not Now'>"
  - "<delay 1>"
  - "<wait 'Securely Encrypted'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Choose Your Look (Light/Dark mode)
  - "<wait 'Choose Your Look'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Update Mac Automatically
  - "<wait 'Update Mac Automatically'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Welcome screen - final step
  - "<wait 'welcome'>"
  - "<delay 1>"
  - "<click 'Get Started'>"
  - "<delay 5>"

  # Setup complete - wait for desktop to fully load
  - "<delay 30>"

  # Click on desktop to give it keyboard focus
  # Without this, hotkeys won't work (you'll hear the "trrr" error sound)
  - "<click_at 960,540>"
  - "<delay 1>"

  # ============================================
  # Enable full keyboard navigation (required for Tab in System Settings)
  # ============================================
  - "<cmd+space>"
  - "<delay 5>"
  - "<type 'Termina', delay=350>"
  - "<delay 5>"
  - "<enter>"
  - "<delay 5>"
  - "<type 'defaults write NSGlobalDomain AppleKeyboardUIMode -int 3', delay=350>"
  - "<enter>"
  - "<delay 3>"
  - "<cmd+q>"
  - "<delay 4>"

  # Click on desktop to refocus
  - "<click_at 960,540>"
  - "<delay 1>"

  # ============================================
  # Enable SSH and Full Disk Access via System Settings
  # ============================================
  # Open Spotlight and search for System Settings
  - "<cmd+space>"
  - "<delay 2>"
  - "<type 'System Settings'>"
  - "<delay 2>"
  - "<enter>"
  - "<delay 5>"

  # Wait for System Settings to fully load (sidebar shows General)
  - "<wait 'General', timeout=30>"
  - "<delay 2>"

  # Search for Remote Login settings
  - "<cmd+f>"
  - "<delay 1>"
  - "<type 'login'>"
  - "<delay 2>"
  - "<click 'Remote Login'>"
  - "<delay 30>"

  # Enable Remote Login toggle (first toggle on the page)
  - "<space>"
  - "<delay 5>"
  - "<tab>"
  - "<delay 5>"
  - "<space>"
  - "<delay 5>"
  - "<click 'Done'>"
  - "<delay 5>"

  # Close System Settings
  - "<cmd+q>"
  - "<delay 2>"

  # ============================================
  # Setup Complete!
  # ============================================
  # SSH is now enabled - Connect with: ssh weave@<ip-address> (password: weave)
  # Full disk access for remote users is enabled

# Health check to verify setup was successful
# This will SSH into the VM to confirm SSH is working
health_check:
  type: ssh
  user: weave
  password: weave
  timeout: 30
  retries: 5
  retry_delay: 10

# Post-setup commands to run via SSH after health check passes
# These are more reliable than typing in Terminal via VNC
post_ssh_commands:
  # Enable auto-login for the weave user
  - "sudo sysadminctl -autologin set -userName weave -password weave"
  # Generate kcpassword for auto-login (sysadminctl alone doesn't always create it)
  - "perl -e 'my @k=(125,137,82,35,210,188,221,234,163,185,31);my @p=unpack(q{C*},q{weave});my @e;for my $i(0..$#p){$e[$i]=$p[$i]^$k[$i%scalar@k]}my $r=scalar@e%12;push@e,(0)x(12-$r) if $r;open my $f,q{>},q{/tmp/kcp};binmode $f;print $f pack(q{C*},@e);close $f'"
  - "sudo cp /tmp/kcp /etc/kcpassword"
  - "sudo chmod 600 /etc/kcpassword"
  - "rm /tmp/kcp"
  # Disable screen saver
  - "defaults -currentHost write com.apple.screensaver idleTime -int 0"
  # Disable require password after sleep/screen saver
  - "defaults write com.apple.screensaver askForPassword -int 0"
  # Set password delay to 0 (no delay before requiring password)
  - "defaults write com.apple.screensaver askForPasswordDelay -int 0"
  # Prevent display from sleeping (never)
  - "sudo pmset -a displaysleep 0"
  # Prevent system sleep (never)
  - "sudo pmset -a sleep 0"
  # Disable auto-logout
  - "sudo defaults write /Library/Preferences/.GlobalPreferences com.apple.autologout.AutoLogOutDelay -int 0"
